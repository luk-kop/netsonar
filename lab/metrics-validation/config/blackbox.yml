modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      method: GET
      follow_redirects: false
      preferred_ip_protocol: ip4

  http_2xx_tls:
    prober: http
    timeout: 5s
    http:
      method: GET
      follow_redirects: false
      preferred_ip_protocol: ip4
      fail_if_not_ssl: true
      tls_config:
        insecure_skip_verify: true
