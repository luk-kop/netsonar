apiVersion: 1
providers:
  - name: netsonar-shared
    orgId: 1
    folder: NetSonar
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards/shared
      foldersFromFilesStructure: false

  - name: netsonar-metrics-validation
    orgId: 1
    folder: Metrics Validation
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards/metrics-validation
      foldersFromFilesStructure: false
